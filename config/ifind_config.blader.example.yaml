# Blader 库 + iFinD 同步表（factor_data_wide / stock_daily_qfq）
# 复制为 config/ifind_config.yaml 并填写 database.password
# 或使用环境变量: BLADER_DB_USER / BLADER_DB_PASSWORD

schema: blader

database:
  host: 117.25.133.3
  port: 3306
  name: blader
  username: stock-dev
  password: ""   # 建议留空，改用环境变量 BLADER_DB_PASSWORD
  # 也可直接写 SQLAlchemy URL:
  # url: "mysql+pymysql://user:pass@117.25.133.3:3306/blader?charset=utf8mb4"
  # 或 JDBC（自动转换）:
  # url: "jdbc:mysql://117.25.133.3:3306/blader?serverTimezone=GMT%2B8&..."

tables:
  daily: stock_daily_qfq
  factor: factor_data_wide
  factor_base: factor_base_info
  calendar: stock_trading_day
  index_members: index_members

columns:
  daily:
    date: trade_date
    code: stock_code
    open: open
    high: high
    low: low
    close: close
    volume: volume
  factor:
    date: data_date
    code: stock_code
  factor_base:
    factor_code: factor_code
    factor_name: factor_name
    factor_type: factor_type
    factor_desc: factor_desc
    ths_indicator: ths_indicator
    sort_type: sort_type
    is_valid: is_valid
  calendar:
    date: trade_date
  index_members:
    date: trade_date
    index_code: index_code
    code: stock_code

# 逻辑因子名 -> factor_base_info.factor_code（宽表列见 multi_factor/ifind/factor_wide.py）
factor_mapping:
  pe: PE_TTM
  pb: PB_MRQ
  roe: ROE_TTM

sql_filters:
  daily: ""
  factor: ""
  factor_base: "is_deleted = 0"
  calendar: "is_deleted = 0"

universe:
  mode: index_members     # index_members | factor_distinct | daily_distinct
  index_code: "000300.SH"

benchmark:
  index_code: "000300.SH"
  rq_code: "000300.XSHG"

code_format: ths
momentum_window: 20

# Redis 缓存（因子报告、行情/因子面板）
redis:
  enabled: true
  host: 127.0.0.1
  port: 6379
  password: ""
  database: 1
  key_prefix: "stock_algo:"
  socket_timeout: 5

# 因子绩效 / 回测预热
performance:
  default_years: 3.0
  cache_ttl_report: 3600      # 因子报告缓存秒
  cache_ttl_panel: 86400      # 行情/因子面板缓存秒
  batch_workers: 4            # 因子绩效批量并发
  series_chunk_size: 5000     # 时序落库批量大小

# 每日行情 Parquet 归档（加速 3 年全量 load_base）
parquet_archive:
  enabled: true
  dir: data/parquet/market
  prefer_read: true
  min_coverage: 0.95
  use_monthly_wide: true
  read_workers: 8
  bundle_cache_ttl: 3600
  bundle_use_redis: false
  factor:
    enabled: true
    dir: data/parquet/factor
    prefer_read: true
    min_coverage: 0.95
    use_redis: false
